<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Traveloop</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="#">
                Traveloop
            </a>

            <div>
                <a href="#" class="btn btn-outline-light me-2">Home</a>
                <a href="#" class="btn btn-outline-light me-2">Trips</a>
                <a href="#" class="btn btn-outline-light">Budget</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero text-center">
        <div class="container">
            <h1 class="display-4">
                Welcome To Traveloop
            </h1>

            <p class="lead">
                Personalized Travel Planning Made Easy
            </p>

            <button class="btn btn-primary btn-lg">
                Plan Your Trip
            </button>
        </div>
    </section>

    <!-- Trip Cards -->
    <div class="container mt-5">

        <div class="row">

            <div class="col-md-4">
                <div class="card shadow">
                    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e"
                         class="card-img-top">

                    <div class="card-body">
                        <h5 class="card-title">Goa Trip</h5>

                        <p class="card-text">
                            5 Days Beach Vacation
                        </p>

                        <button class="btn btn-success">
                            View Plan
                        </button>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <!-- JS -->
    <script src="script.js"></script>

</body>
</html>
